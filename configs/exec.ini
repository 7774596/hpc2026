# exec 模式配置：用于 MPI/OpenMP 加速比实验
# 目标是让真实执行时间较短、结果稳定，适合 Slurm 队列中快速完成。

[cluster]
nodes = 4
cores_per_node = 4

[workload]
num_jobs = 120
arrival_rate = 2
runtime_dist = exponential
runtime_mean = 20
runtime_min = 1
runtime_max = 80
cores_min = 1
cores_max = 4
seed = 17

[scheduler]
scheduler = fcfs
rr_quantum = 50

[exec]
exec_time_scale = 0.002
