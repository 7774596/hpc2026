# 小规模配置：本地快速验证 / 单元调试

[cluster]
nodes = 4
cores_per_node = 8

[workload]
num_jobs = 200
arrival_rate = 0.5        ; 作业/模拟秒（泊松到达）
runtime_dist = uniform    ; uniform | exponential
runtime_min = 10
runtime_max = 300
cores_min = 1
cores_max = 8
seed = 42

[scheduler]
scheduler = fcfs          ; fcfs | sjf | rr | backfill（命令行 --scheduler 可覆盖）
rr_quantum = 50           ; RR 时间片（模拟秒），仅 rr 使用

[exec]
exec_time_scale = 0.01    ; exec 模式：模拟秒 * scale = 真实秒
