# 中等规模配置：性能实验用（报告第五章）
# TODO(C): 在此基础上派生 large（百万级作业）配置并扫描 arrival_rate / nodes

[cluster]
nodes = 16
cores_per_node = 16

[workload]
num_jobs = 20000
arrival_rate = 8
runtime_dist = exponential
runtime_mean = 120
runtime_min = 5
runtime_max = 3600
cores_min = 1
cores_max = 16
seed = 7

[scheduler]
scheduler = fcfs
rr_quantum = 50

[exec]
exec_time_scale = 0.001
